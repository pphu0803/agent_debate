<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思想孵化机</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- ===== 左侧边栏 ===== -->
        <aside class="sidebar" id="sidebar">
            <!-- Logo区域 -->
            <div class="sidebar-header">
                <span class="logo">🧠</span>
                <div>
                    <h1 class="app-name">思想孵化机</h1>
                    <p class="app-tagline">AI Agent 辩论机器</p>
                </div>
            </div>

            <!-- 议题输入 -->
            <div class="input-section">
                <textarea id="topicInput" class="topic-input" rows="4"
                    placeholder="输入你的想法或问题..."></textarea>
                <div class="input-meta">
                    <label class="meta-field">
                        <span>轮次</span>
                        <input type="number" id="maxRounds" value="20" min="1" max="50">
                    </label>
                    <label class="meta-field">
                        <span>阈值</span>
                        <input type="number" id="scoreThreshold" value="6" min="1" max="10">
                    </label>
                </div>
                <button class="btn-primary btn-start" id="btnStart">
                    <span>开始辩论</span>
                </button>
                <button class="btn-pause hidden" id="btnPause">暂停</button>
                <button class="btn-stop hidden" id="btnStop">终止</button>
            </div>

            <!-- 评分面板 -->
            <div class="scores-panel hidden" id="scoresPanel">
                <div class="panel-title">接受度评分</div>
                <div class="scores-list" id="scoresList"></div>
                <div class="consensus-bar">
                    <div class="consensus-label">
                        <span>共识进度</span>
                        <span id="consensusText">等待评分</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="consensusBar"></div>
                    </div>
                </div>
            </div>

            <!-- 底部工具栏 -->
            <div class="sidebar-footer">
                <button class="tool-btn" id="btnHistory" title="历史">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>历史</span>
                </button>
                <div class="export-dropdown">
                    <button class="tool-btn" id="btnExport" title="导出" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span>导出</span>
                    </button>
                    <div class="export-menu hidden" id="exportMenuSidebar">
                        <button class="export-option" data-format="report">📝 思想孵化报告 (MD)</button>
                        <button class="export-option" data-format="md">📋 完整辩论记录 (MD)</button>
                        <button class="export-option" data-format="summary">📌 精简纪要 (MD)</button>
                        <button class="export-option" data-format="json">💾 原始数据 (JSON)</button>
                        <button class="export-option" data-format="pdf">🖨️ 打印为PDF</button>
                    </div>
                </div>
                <button class="tool-btn" id="btnSettings" title="设置">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.82-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.82 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>设置</span>
                </button>
            </div>
        </aside>

        <!-- ===== 主聊天区 ===== -->
        <main class="chat-main">
            <!-- 顶部状态栏 -->
            <div class="chat-topbar hidden" id="chatTopbar">
                <div class="topbar-topic" id="topbarTopic"></div>
                <div class="topbar-status" id="topbarStatus">准备中</div>
                <div class="topbar-round" id="topbarRound"></div>
            </div>

            <!-- 消息流 -->
            <div class="messages" id="messagesContainer">
                <!-- 空状态 -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🧠</div>
                    <h2>思想孵化机</h2>
                    <p>输入一个想法、问题或任何思考</p>
                    <p>三个AI Agent将围绕它展开多轮辩论</p>
                    <div class="empty-agents">
                        <div class="empty-agent" style="--c: #E8705A">
                            <div class="empty-avatar">💡</div>
                            <div class="empty-name">创新者</div>
                            <div class="empty-desc">提出新视角和新机制</div>
                        </div>
                        <div class="empty-agent" style="--c: #6B8FA8">
                            <div class="empty-avatar">⚔️</div>
                            <div class="empty-name">批判者</div>
                            <div class="empty-desc">逻辑审查找出漏洞</div>
                        </div>
                        <div class="empty-agent" style="--c: #A8B574">
                            <div class="empty-avatar">🔍</div>
                            <div class="empty-name">严谨者</div>
                            <div class="empty-desc">用事实和证据支撑</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部状态提示 -->
            <div class="chat-bottombar hidden" id="chatBottombar">
                <div class="bottombar-content" id="bottombarContent">
                    <span class="pulse-dot"></span>
                    <span>等待开始...</span>
                </div>
                <!-- 暂停时显示用户输入区 -->
                <div class="bottombar-input hidden" id="bottombarInput">
                    <textarea id="userInput" placeholder="输入你的观点，按Ctrl+Enter发送..." rows="2"></textarea>
                    <button class="btn-send" id="btnSend">发送</button>
                </div>
                <!-- 辩论结束后显示的操作区 -->
                <div class="debate-actions hidden" id="debateActions">
                    <button class="btn-action" id="btnViewReport">📄 查看报告</button>
                    <button class="btn-action" id="btnContinue">💬 继续讨论</button>
                    <div class="debate-continue hidden" id="debateContinue">
                        <textarea id="continueInput" placeholder="补充你的想法，延续讨论..." rows="2"></textarea>
                        <button class="btn-send" id="btnContinueSend">开始新辩论</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ===== 设置弹窗 ===== -->
    <div class="modal-overlay hidden" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>LLM 配置</h2>
                <button class="modal-close" id="closeSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="sk-...">
                    <p class="form-hint">支持OpenAI、DeepSeek、Ollama等兼容API</p>
                </div>
                <div class="form-group">
                    <label>API Base URL</label>
                    <input type="text" id="apiBaseInput" placeholder="https://api.openai.com/v1">
                </div>
                <div class="form-group">
                    <label>模型</label>
                    <input type="text" id="modelInput" placeholder="gpt-4o">
                </div>
                <div class="config-status" id="configStatus"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelSettings">取消</button>
                <button class="btn-primary" id="saveSettings">保存</button>
            </div>
        </div>
    </div>

    <!-- ===== 历史弹窗 ===== -->
    <div class="modal-overlay hidden" id="historyModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h2>历史辩论</h2>
                <button class="modal-close" id="closeHistory">&times;</button>
            </div>
            <div class="modal-body">
                <div class="history-tabs">
                    <button class="history-tab active" data-filter="all">全部</button>
                    <button class="history-tab" data-filter="resumable">可恢复</button>
                    <button class="history-tab" data-filter="completed">已完成</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <!-- ===== 报告弹窗 ===== -->
    <div class="modal-overlay hidden" id="reportModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h2>思想孵化报告</h2>
                <button class="modal-close" id="closeReport">&times;</button>
            </div>
            <div class="modal-body">
                <div class="report-content" id="reportContent"></div>
            </div>
            <div class="modal-footer">
                <div class="export-dropdown">
                    <button class="btn-primary" id="exportMenuBtn">导出 <span class="caret">▼</span></button>
                    <div class="export-menu hidden" id="exportMenu">
                        <button class="export-option" data-format="report">📝 思想孵化报告 (MD)</button>
                        <button class="export-option" data-format="md">📋 完整辩论记录 (MD)</button>
                        <button class="export-option" data-format="summary">📌 精简纪要 (MD)</button>
                        <button class="export-option" data-format="json">💾 原始数据 (JSON)</button>
                        <button class="export-option" data-format="pdf">🖨️ 打印为PDF</button>
                    </div>
                </div>
                <button class="btn-cancel" id="closeReportBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- ===== 登录弹窗 ===== -->
    <div class="modal-overlay hidden" id="loginModal">
        <div class="modal">
            <div class="modal-header">
                <h2>🔐 访问验证</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>访问密码</label>
                    <input type="password" id="loginPasswordInput" placeholder="请输入访问密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="btnLogin">进入</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
</body>
</html>
