# ============================================
# 思想孵化机 - Nginx反向代理配置
# 域名: debate.healthcompanion.com.cn
# 关键: SSE端点需要特殊处理(关闭缓冲、延长超时)
# ============================================

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name debate.healthcompanion.com.cn;

    # Let's Encrypt 证书验证路径（首次申请证书时用）
    location /.well-known/acme-challenge/ {
        root /etc/nginx/certs/acme;
    }

    # 其余请求跳转到HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl;
    http2 on;
    server_name debate.healthcompanion.com.cn;

    # SSL证书路径（由 init-ssl.sh 自动申请并挂载）
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SSL优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # 上传文件大小限制（辩论议题最大5000字，足够）
    client_max_body_size 10m;

    # ============ SSE 流式端点（关键！）============
    # 辩论的实时推送走 /api/debates/{id}/stream
    # 必须关闭代理缓冲、延长超时，否则代理会缓存事件导致"卡住"
    location /api/debates {
        if ($request_uri ~* "/stream$") {
            # SSE连接：标记为流式
        }

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE关键配置：禁用缓冲，保持长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';

        # 长超时（一场辩论可能持续几十分钟）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ============ 其余API + 前端静态文件 ============
    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 普通请求的超时
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
